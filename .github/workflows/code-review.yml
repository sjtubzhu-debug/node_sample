name: Code Review

on:
  pull_request:
    branches: [ main, develop ]

jobs:
  review:
    name: Automated Code Review
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Fetch full history for comparison

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'

    - name: Check commit message format
      run: |
        echo "Checking recent commit message..."
        git log --format=%B -n 1 HEAD | head -1

    - name: Check file changes
      run: |
        echo "Changed files:"
        git diff --name-only origin/main...HEAD

    - name: Check code line changes
      run: |
        echo "Code statistics:"
        git diff --stat origin/main...HEAD

    - name: Check for console.log
      run: |
        echo "Checking for leftover console.log..."
        git diff origin/main...HEAD | grep "^\+.*console\.log" || echo "✅ No console.log found"
      continue-on-error: true

    - name: Check for debug code
      run: |
        echo "Checking for debug code..."
        git diff origin/main...HEAD | grep "^\+.*debugger" || echo "✅ No debugger found"
      continue-on-error: true

    - name: PR size check
      run: |
        CHANGED_FILES=$(git diff --name-only origin/main...HEAD | wc -l)
        CHANGED_LINES=$(git diff --stat origin/main...HEAD | tail -1 | grep -oE '[0-9]+ insertion' | grep -oE '[0-9]+' || echo 0)
        echo "Changed files: $CHANGED_FILES"
        echo "Added lines: $CHANGED_LINES"
        if [ "$CHANGED_FILES" -gt 50 ]; then
          echo "⚠️  Warning: PR contains more than 50 files, consider splitting"
        fi
        if [ "$CHANGED_LINES" -gt 1000 ]; then
          echo "⚠️  Warning: PR contains more than 1000 lines of changes, consider splitting"
        fi
      continue-on-error: true

